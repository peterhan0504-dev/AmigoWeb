<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-key="page_title">Amigo Global</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@500;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <style>body{opacity:0;transition:opacity .15s}body.ready{opacity:1}</style>
</head>
<body data-page="index">
  <!-- 顶部导航：由 /partials/nav-zh.html 注入 -->
  <div data-include="nav"></div>

  <!-- Hero -->
  <section class="hero">
    <div>
      <div class="hero-eyebrow" data-key="hero.eyebrow"></div>
      <h1 data-key="hero.title" data-html></h1>
      <p data-key="hero.desc"></p>
      <div class="btn-row">
        <a class="btn btn-primary" href="contact.html" data-key="hero.btn1"></a>
      </div>
    </div>
    <div class="hero-visual">
      <img src="../assets/images/hero-commerce.jpg" alt="Amigo Global 全球电商平台" />
    </div>
  </section>

  <!-- 数据条 -->
  <section class="stats">
    <div class="stats-inner" data-list="stats">
      <template>
        <div>
          <div class="stat-num" data-field="num"></div>
          <div class="stat-label" data-field="label"></div>
        </div>
      </template>
    </div>
  </section>

  <!-- 业务板块 -->
  <section class="section" id="business">
    <div class="section-eyebrow" data-key="business.eyebrow"></div>
    <h2 class="accent-underline" data-key="business.title"></h2>
    <div class="biz-grid" data-list="business.cards">
      <template>
        <div class="biz-card">
          <h3 data-field="title"></h3>
          <p data-field="desc"></p>
          <div class="biz-link" data-field="link"></div>
        </div>
      </template>
    </div>
  </section>

  <!-- 核心技术 -->
  <section class="section technology">
    <h2 class="accent-underline" data-key="technology.title"></h2>
    <div class="tech-grid" data-list="technology.cards">
      <template>
        <div class="tech-card">
          <div class="tech-icon" data-field="icon"></div>
          <div>
            <h3 data-field="title"></h3>
            <p data-field="desc"></p>
            <div class="tech-link" data-field="link"></div>
          </div>
        </div>
      </template>
    </div>
  </section>

  <!-- 共创联盟 -->
  <section class="alliance">
    <div class="alliance-inner">
      <div class="alliance-orbit">
        <div class="alliance-bubble alliance-risk" data-key="alliance.risk"></div>
        <div class="alliance-bubble alliance-invest" data-key="alliance.invest"></div>
        <div class="alliance-bubble alliance-burden" data-key="alliance.burden"></div>
        <div class="alliance-core" data-key="alliance.title"></div>
      </div>
      <a class="alliance-link" href="contact.html" data-key="alliance.link"></a>
    </div>
  </section>

  <!-- 新闻 -->
  <section class="section bleed" id="news">
    <div class="inner">
      <div class="section-eyebrow" data-key="news.eyebrow"></div>
      <h2 data-key="news.title"></h2>
      <p class="lead" data-key="news.lead"></p>
      <div class="news-grid" data-list="news.cards">
        <template>
          <div class="news-card">
            <div class="news-img"><img data-field-src="image" data-src-prefix="../assets/images/" alt="" onerror="this.style.display='none'" /></div>
            <div class="news-meta"><span data-field="category"></span> · <span data-field="date"></span></div>
            <h4 data-field="title"></h4>
            <p data-field="summary"></p>
          </div>
        </template>
      </div>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta-band">
    <div class="cta-inner">
      <h2 data-key="cta.title" data-html></h2>
      <a href="contact.html" class="btn btn-primary" data-key="cta.btn"></a>
    </div>
  </section>

  <!-- 页脚：由 /partials/footer-zh.html 注入 -->
  <div data-include="footer"></div>

  <script src="../js/include.js"></script>
</body>
</html>
