<footer>
  <div class="footer-inner">
    <div class="footer-grid">
      <div>
        <div class="footer-brand"><span data-settings-key="footer.brand_primary"></span><span>·</span><span data-settings-key="footer.brand_secondary"></span></div>
        <p class="footer-tagline"><span data-settings-key="footer.tagline"></span><br /><span data-settings-key="footer.subtagline"></span></p>
      </div>
      <div>
        <h5 data-settings-key="footer.col_business_title"></h5>
        <ul data-list-settings="footer.col_business_links">
          <template><li><a href="#" data-field-self></a></li></template>
        </ul>
      </div>
      <div>
        <h5 data-settings-key="footer.col_company_title"></h5>
        <ul data-list-settings="footer.col_company_links">
          <template><li><a href="#" data-field-self></a></li></template>
        </ul>
      </div>
      <div>
        <h5 data-settings-key="footer.col_support_title"></h5>
        <ul data-list-settings="footer.col_support_links">
          <template><li><a href="#" data-field-self></a></li></template>
        </ul>
      </div>
    </div>
    <div class="footer-bottom">
      <span><span data-settings-key="footer.copyright"></span><span data-show-if-settings="company.icp_number"> · <span data-settings-key="company.icp_number"></span></span></span>
      <span data-show-if-settings="company.is_listed"><span data-settings-key="company.stock_exchange"></span> : <span data-settings-key="company.stock_ticker"></span></span>
    </div>
  </div>
</footer>
