<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amigo Global</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: linear-gradient(135deg, #fff5eb 0%, #fff 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; color: #1a1a1a; }
    .card { max-width: 480px; text-align: center; }
    .brand { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 12px; }
    .brand span { color: #ff6a00; }
    .tagline { color: #666; font-size: 15px; margin-bottom: 48px; line-height: 1.6; }
    .picker { display: flex; gap: 16px; justify-content: center; }
    .picker a { display: block; padding: 20px 36px; border: 2px solid #ff6a00; border-radius: 12px; text-decoration: none; color: #ff6a00; font-weight: 700; font-size: 18px; min-width: 140px; transition: all 0.2s; }
    .picker a:hover { background: #ff6a00; color: white; }
    .picker a small { display: block; font-size: 11px; font-weight: 400; opacity: 0.7; margin-top: 4px; letter-spacing: 0.12em; }
    .note { margin-top: 32px; font-size: 12px; color: #aaa; }
  </style>
  <script>
    (function () {
      // 自动按浏览器语言跳转。访问 ?stay=1 时不跳转，方便手动挑语言。
      if (new URLSearchParams(location.search).get('stay')) return;
      var l = (navigator.language || 'en').toLowerCase();
      var target = l.startsWith('zh') ? 'zh/index.html' : 'en/index.html';
      setTimeout(function () { location.replace(target); }, 250);
    })();
  </script>
</head>
<body>
  <div class="card">
    <div class="brand">Amigo<span>·</span>Global</div>
    <div class="tagline">让跨境批发像本地采购一样简单 · Global goods, local simplicity</div>
    <div class="picker">
      <a href="zh/index.html">中文<small>CHINESE</small></a>
      <a href="en/index.html">English<small>ENGLISH</small></a>
    </div>
    <div class="note">系统会按浏览器语言自动跳转；附 <code>?stay=1</code> 留在本页</div>
  </div>
</body>
</html>
